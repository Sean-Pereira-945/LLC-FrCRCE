<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Search Courses | LLC@FRCRCE</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@100..900&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-container":"#828eb1","surface-container-lowest":"#ffffff",
            "primary-container":"#1a2744","on-tertiary-container":"#d07900",
            "primary-fixed-dim":"#b9c6eb","secondary-container":"#d6e3fa",
            "surface-container":"#edeef1","on-surface-variant":"#45464d",
            "error-container":"#ffdad6","background":"#f8f9fc",
            "surface-variant":"#e1e2e5","surface-container-highest":"#e1e2e5",
            "tertiary":"#210e00","on-surface":"#191c1e",
            "on-secondary-container":"#586578","on-error-container":"#93000a",
            "inverse-surface":"#2e3133","inverse-primary":"#b9c6eb",
            "primary-fixed":"#d9e2ff","on-secondary":"#ffffff",
            "on-error":"#ffffff","surface-container-low":"#f2f3f6",
            "secondary-fixed-dim":"#bac7dd","secondary":"#525f72",
            "on-secondary-fixed-variant":"#3b485a",
            "surface":"#f8f9fc","outline-variant":"#c5c6ce",
            "outline":"#75777e","surface-container-high":"#e7e8eb",
            "surface-dim":"#d9dadd","on-primary-fixed":"#0d1b37",
            "on-tertiary-fixed-variant":"#6a3b00","tertiary-fixed":"#ffdcbf",
            "on-tertiary-fixed":"#2d1600","secondary-fixed":"#d6e3fa",
            "surface-bright":"#f8f9fc","on-secondary-fixed":"#0f1c2c",
            "primary":"#04122e","on-primary":"#ffffff",
            "inverse-on-surface":"#f0f1f4","tertiary-container":"#3e2000",
            "error":"#ba1a1a","tertiary-fixed-dim":"#ffb873",
            "surface-tint":"#515e7e","on-primary-fixed-variant":"#3a4665",
            "on-background":"#191c1e","on-tertiary":"#ffffff"
          },
          fontFamily: {
            "headline":["Instrument Serif","serif"],
            "body":["Geist","sans-serif"],
            "label":["IBM Plex Mono","monospace"]
          },
          borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/css/theme.css"/>
</head>
<body class="bg-surface text-on-background font-body selection:bg-tertiary-fixed selection:text-on-tertiary-fixed" data-page="search">

    <!-- TopNavBar -->
  <nav class="navbar fixed top-0 w-full h-[64px] z-50 bg-surface-container-lowest/80 backdrop-blur-md flex justify-between items-center px-8 border-b border-surface-variant" id="mainNav">
    <a href="/" class="font-headline italic text-2xl text-primary no-underline">LLC@FRCRCE</a>

    <button class="md:hidden flex flex-col gap-1.5 p-2" id="navToggle" aria-label="Toggle menu">
      <span class="block w-5 h-0.5 bg-primary rounded-full"></span>
      <span class="block w-5 h-0.5 bg-primary rounded-full"></span>
      <span class="block w-5 h-0.5 bg-primary rounded-full"></span>
    </button>

    <div class="hidden md:flex items-center gap-8" id="navLinks">
      <a class="nav-link font-medium transition-colors duration-300" href="/search">Programs</a>
      <a class="nav-link font-medium transition-colors duration-300" href="/about">About</a>
      <a class="nav-link font-medium transition-colors duration-300" href="/contact">Contact</a>
    </div>

    <div class="hidden md:flex items-center gap-6">

      <a href="/login" class="text-secondary font-medium hover:text-primary transition-colors duration-300">Login</a>
      <a href="/registration" class="bg-primary text-on-primary px-5 py-2 rounded-lg font-medium hover:bg-tertiary-fixed hover:text-on-tertiary-fixed transition-all active:scale-95 no-underline">Join Now</a>
    </div>

    <!-- Mobile menu -->
    <div class="nav-links-mobile md:hidden" id="navLinksMobile">

      <a class="nav-link font-medium py-2" href="/search">Programs</a>
      <a class="nav-link font-medium py-2" href="/about">About</a>
      <a class="nav-link font-medium py-2" href="/contact">Contact</a>
      <a class="text-secondary font-medium py-2" href="/login">Login</a>
      <a href="/registration" class="bg-primary text-on-primary px-6 py-2 rounded-lg font-medium text-center mt-2 no-underline">Join Now</a>
    </div>
  </nav>

  <main class="pt-16">
    <section class="py-12">
      <div class="max-w-screen-2xl mx-auto px-8 space-y-8">

        <!-- Search Card -->
        <div class="bg-surface-container-lowest rounded-2xl editorial-shadow p-8">
          <h1 class="font-headline text-3xl md:text-4xl text-primary italic mb-6">Search Courses</h1>
          <form id="searchForm" class="grid grid-cols-1 md:grid-cols-[1fr_180px_160px] lg:grid-cols-[1fr_180px_160px_auto_auto_auto] gap-3 items-end">
            <div>
              <label class="font-label text-[11px] uppercase tracking-widest text-secondary mb-2 block" for="searchQuery">Keyword</label>
              <input class="form-input-themed w-full h-11 px-4 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface text-sm" id="searchQuery" placeholder="Search by course name..." aria-label="Search query">
            </div>
            <div>
              <label class="font-label text-[11px] uppercase tracking-widest text-secondary mb-2 block" for="searchCategory">Category</label>
              <select class="form-input-themed w-full h-11 px-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface text-sm" id="searchCategory" aria-label="Category filter">
                <option value="">All Categories</option>
                <option value="Technical">Technical</option>
                <option value="Non-technical">Non-technical</option>
                <option value="Self-Development">Self-Development</option>
                <option value="Extra-curricular">Extra-curricular</option>
              </select>
            </div>
            <div>
              <label class="font-label text-[11px] uppercase tracking-widest text-secondary mb-2 block" for="searchSort">Sort</label>
              <select class="form-input-themed w-full h-11 px-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface text-sm" id="searchSort" aria-label="Sort results">
                <option value="newest">Newest</option>
                <option value="popular">Most Popular</option>
                <option value="alphabetical">A-Z</option>
              </select>
            </div>
            <label class="flex items-center gap-2 text-secondary text-sm cursor-pointer h-11">
              <input id="searchHasCapacity" type="checkbox" class="rounded border-outline-variant text-primary focus:ring-on-tertiary-container"> Open seats only
            </label>
            <button class="h-11 px-5 border border-outline-variant text-secondary rounded-lg font-medium hover:border-primary hover:text-primary transition-all text-sm" type="button" id="clearFilters">Clear</button>
            <button class="h-11 px-6 bg-primary text-on-primary rounded-lg font-medium hover:bg-primary-container transition-all active:scale-95 text-sm" type="submit">Search</button>
          </form>

          <div id="activeFilterChips" class="flex flex-wrap gap-2 mt-4"></div>
        </div>

        <!-- Results Area -->
        <div>
          <div id="searchEmpty" class="bg-surface-container-lowest rounded-2xl editorial-shadow p-12 text-center" style="display:block;">
            <span class="material-symbols-outlined text-5xl text-outline-variant mb-4">search</span>
            <h2 class="font-headline text-2xl text-primary italic mb-2">Start your search</h2>
            <p class="text-secondary max-w-md mx-auto">Enter a keyword to discover relevant courses and enroll quickly.</p>
          </div>
          <div id="searchResults" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

      </div>
    </section>
  </main>

  <script src="/js/script.js"></script>

  </body>
</html>
