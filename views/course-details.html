<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Details | LLC@FRCRCE</title>

  <!-- Google Fonts: Instrument Serif, Geist, IBM Plex Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@100..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#04122e',
            'on-primary': '#ffffff',
            'primary-container': '#1a2744',
            'on-primary-container': '#ffffff',
            secondary: '#525f72',
            'on-secondary': '#ffffff',
            'secondary-container': '#d9e2ff',
            'on-secondary-container': '#001a43',
            tertiary: '#d07900',
            'tertiary-fixed': '#ffdcbf',
            'on-tertiary-fixed': '#2c1500',
            'on-tertiary-container': '#422400',
            background: '#fcfcff',
            'on-background': '#191c1e',
            surface: '#fcfcff',
            'on-surface': '#191c1e',
            'surface-variant': '#e1e2e5',
            'on-surface-variant': '#45464d',
            outline: '#75777e',
            'outline-variant': '#c5c6ce'
          },
          fontFamily: {
            headline: ['"Instrument Serif"', 'serif'],
            body: ['"Geist"', 'sans-serif'],
            label: ['"IBM Plex Mono"', 'monospace']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/theme.css"/>
  <style>
    /* Tab Transitions */
    .tab-content {
      display: none;
      opacity: 0;
      transition: opacity 200ms ease;
    }
    .tab-content.active {
      display: block;
      opacity: 1;
    }
    .tab-btn {
      border-bottom: 2px solid transparent;
      transition: all 150ms ease;
    }
    .tab-btn.active {
      border-color: #04122e;
      color: #04122e;
      font-weight: 600;
    }
    /* Only show teacher controls if user is the teacher */
    .teacher-only, .teacher-only-block {
      display: none !important;
    }
    body[data-role="teacher"] .teacher-only {
      display: flex !important;
    }
    body[data-role="teacher"] .teacher-only-block {
      display: block !important;
    }
  </style>
</head>
<body class="bg-surface text-on-background font-body selection:bg-tertiary-fixed selection:text-on-tertiary-fixed" data-page="course-details">

  <!-- TopNavBar -->
  <nav class="navbar fixed top-0 w-full h-[64px] z-50 bg-surface-container-lowest/80 backdrop-blur-md flex justify-between items-center px-8 border-b border-surface-variant" id="mainNav">
    <a href="/" class="font-headline italic text-2xl text-primary no-underline">LLC@FRCRCE</a>

    <button class="md:hidden flex flex-col gap-1.5 p-2" id="navToggle" aria-label="Toggle menu">
      <span class="block w-5 h-0.5 bg-primary rounded-full"></span>
      <span class="block w-5 h-0.5 bg-primary rounded-full"></span>
      <span class="block w-5 h-0.5 bg-primary rounded-full"></span>
    </button>

    <div class="hidden md:flex items-center gap-8" id="navLinks">
      <a class="nav-link font-medium transition-colors duration-300" href="/student-dashboard" id="dashboardLink">Dashboard</a>
      <a class="nav-link font-medium transition-colors duration-300" href="/search">Programs</a>
    </div>

    <!-- Right side: User profile -->
    <div class="hidden md:flex items-center gap-4 text-secondary text-sm font-medium">

      <span id="navUserName"></span>
      <div class="w-8 h-8 rounded-full bg-tertiary-fixed text-primary flex items-center justify-center font-bold" id="navUserInitials"></div>
      <button class="hover:text-primary transition-colors ml-2" id="logoutBtn" title="Logout">Logout</button>
    </div>

    <!-- Mobile menu -->
    <div class="nav-links-mobile md:hidden" id="navLinksMobile">

      <a class="nav-link font-medium py-2" href="/student-dashboard" id="mobileDashboardLink">Dashboard</a>
      <a class="nav-link font-medium py-2" href="/search">Programs</a>
      <button class="text-secondary font-medium py-2 mt-4 text-left border-t border-surface-variant" id="mobileLogoutBtn">Logout</button>
    </div>
  </nav>

  <main class="pt-24 max-w-5xl mx-auto px-6 pb-24">
    <!-- Course Header Banner -->
    <div class="bg-primary text-white rounded-2xl p-8 md:p-12 mb-8 relative overflow-hidden editorial-shadow">
      <!-- Decorative background -->
      <div class="absolute -right-20 -top-20 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
      
      <div class="relative z-10 flex flex-col justify-end min-h-[120px]">
        <h1 class="font-headline text-4xl md:text-5xl italic mb-2" id="courseTitle">Loading Course...</h1>
        <p class="text-white/80 font-medium text-lg flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">person</span>
          <span id="courseTeacher">Teacher Name</span>
        </p>
      </div>
    </div>

    <!-- Tab Navigation -->
    <div class="flex items-center gap-4 sm:gap-8 border-b border-surface-variant mb-8 px-4 overflow-x-auto whitespace-nowrap" id="courseTabs">
      <button class="tab-btn active pb-3 text-secondary hover:text-primary font-medium px-2" data-target="stream">Stream</button>
      <button class="tab-btn pb-3 text-secondary hover:text-primary font-medium px-2" data-target="classwork">Classwork</button>
      <button class="tab-btn pb-3 text-secondary hover:text-primary font-medium px-2" data-target="people">People</button>
    </div>

    <!-- STREAM TAB -->
    <div id="stream" class="tab-content active space-y-6">
      <!-- Create Announcement (Teacher Only) -->
      <div class="card p-6 teacher-only-block border border-outline-variant bg-surface-container-lowest shadow-sm mb-8">
        <form id="announcementForm" class="flex flex-col gap-3">
          <textarea id="announcementContent" placeholder="Announce something to your class..." class="form-input-themed w-full p-4 rounded-xl resize-none min-h-[100px] border border-surface-variant focus:border-tertiary focus:ring-1 focus:ring-tertiary transition-all" required></textarea>
          <div class="flex justify-end">
            <button type="submit" class="btn btn-primary" id="postAnnouncementBtn">Post</button>
          </div>
        </form>
      </div>

      <!-- Announcements Feed -->
      <div id="announcementsList" class="space-y-6">
        <p class="text-secondary text-center py-8">Retrieving announcements...</p>
      </div>
    </div>

    <!-- CLASSWORK TAB -->
    <div id="classwork" class="tab-content space-y-8">
      <!-- Teacher Controls -->
      <div class="teacher-only flex items-center gap-3 mb-6">
        <button class="btn btn-primary shadow-sm" id="btnCreateModule">
          <span class="material-symbols-outlined text-[18px]">add</span> Create Module
        </button>
        <button class="btn btn-secondary shadow-sm" id="btnCreateAssignment">
          <span class="material-symbols-outlined text-[18px]">assignment</span> Create Assignment
        </button>
      </div>

      <!-- Modules Container -->
      <div id="modulesContainer" class="space-y-8">
        <p class="text-secondary text-center py-8">Loading classwork...</p>
      </div>
    </div>

    <!-- PEOPLE TAB -->
    <div id="people" class="tab-content">
      <h2 class="font-headline text-3xl italic text-primary border-b border-surface-variant pb-4 mb-6 relative">
        Teacher
      </h2>
      <div class="flex items-center gap-4 mb-12 px-4">
        <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold" id="teacherAvatar">T</div>
        <span class="font-medium text-lg text-primary" id="teacherName">...</span>
      </div>

      <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-surface-variant pb-4 mb-6 gap-2">
        <h2 class="font-headline text-3xl italic text-primary">Classmates</h2>
        <span class="text-secondary font-medium" id="studentCount">0 students</span>
      </div>
      
      <div id="studentsList" class="space-y-4 px-4">
        <p class="text-secondary">Loading students...</p>
      </div>
    </div>

  </main>

  <!-- Modals -->

  <!-- Create Module Modal -->
  <div class="modal-overlay" id="moduleModal" aria-hidden="true">
    <div class="card w-full max-w-md p-6 bg-surface-container-lowest relative">
      <button class="absolute top-4 right-4 text-secondary hover:text-primary" data-close-modal="moduleModal">
        <span class="material-symbols-outlined">close</span>
      </button>
      <h3 class="font-headline text-2xl text-primary italic mb-6">Create Module</h3>
      <form id="moduleForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-secondary mb-1">Module Title *</label>
          <input type="text" id="modTitle" class="form-input-themed w-full p-3 rounded-xl border border-surface-variant" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary mb-1">Description</label>
          <textarea id="modDescription" class="form-input-themed w-full p-3 rounded-xl border border-surface-variant resize-none" rows="3"></textarea>
        </div>
        <div class="pt-4 flex justify-end">
          <button type="button" class="btn btn-ghost mr-2" data-close-modal="moduleModal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveModuleBtn">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Upload Material Modal -->
  <div class="modal-overlay" id="materialModal" aria-hidden="true">
    <div class="card w-full max-w-md p-6 bg-surface-container-lowest relative">
      <button class="absolute top-4 right-4 text-secondary hover:text-primary" data-close-modal="materialModal">
        <span class="material-symbols-outlined">close</span>
      </button>
      <h3 class="font-headline text-2xl text-primary italic mb-6">Upload Material</h3>
      <form id="materialForm" class="space-y-4">
        <input type="hidden" id="matModuleId">
        <div>
          <label class="block text-sm font-medium text-secondary mb-1">Material Title *</label>
          <input type="text" id="matTitle" class="form-input-themed w-full p-3 rounded-xl border border-surface-variant" required placeholder="e.g. Chapter 1 Slides">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary mb-1">File *</label>
          <input type="file" id="matFile" class="form-input-themed w-full p-3 rounded-xl border border-surface-variant bg-surface" required>
          <p class="text-xs text-secondary mt-1">PDF, Word, Images up to 10MB</p>
        </div>
        <div class="pt-4 flex justify-end">
          <button type="button" class="btn btn-ghost mr-2" data-close-modal="materialModal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveMaterialBtn">Upload</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Module Modal -->
  <div class="modal-overlay" id="editModuleModal" aria-hidden="true">
    <div class="card w-full max-w-md p-6 bg-surface-container-lowest relative">
      <button class="absolute top-4 right-4 text-secondary hover:text-primary" data-close-modal="editModuleModal">
        <span class="material-symbols-outlined">close</span>
      </button>
      <h3 class="font-headline text-2xl text-primary italic mb-6">Edit Module</h3>
      <form id="editModuleForm" class="space-y-4">
        <input type="hidden" id="editModuleId">
        <div>
          <label class="block text-sm font-medium text-secondary mb-1">Module Title *</label>
          <input type="text" id="editModTitle" class="form-input-themed w-full p-3 rounded-xl border border-surface-variant" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary mb-1">Description</label>
          <textarea id="editModDescription" class="form-input-themed w-full p-3 rounded-xl border border-surface-variant resize-none" rows="3"></textarea>
        </div>
        <div class="pt-4 flex justify-end">
          <button type="button" class="btn btn-ghost mr-2" data-close-modal="editModuleModal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveEditModuleBtn">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Create Assignment Modal -->
  <div class="modal-overlay" id="assignmentModal" aria-hidden="true">
    <div class="card w-full max-w-md p-6 bg-surface-container-lowest relative">
      <button class="absolute top-4 right-4 text-secondary hover:text-primary" data-close-modal="assignmentModal">
        <span class="material-symbols-outlined">close</span>
      </button>
      <h3 class="font-headline text-2xl text-primary italic mb-6">Create Assignment</h3>
      <form id="assignmentForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-secondary mb-1">Title *</label>
          <input type="text" id="asgTitle" class="form-input-themed w-full p-3 rounded-xl border border-surface-variant" required placeholder="e.g. Lab Report 1">
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary mb-1">Instructions *</label>
          <textarea id="asgDescription" class="form-input-themed w-full p-3 rounded-xl border border-surface-variant resize-none" rows="4" required placeholder="Describe what students need to do..."></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-secondary mb-1">Due Date (optional)</label>
          <input type="datetime-local" id="asgDueDate" class="form-input-themed w-full p-3 rounded-xl border border-surface-variant">
        </div>
        <div class="pt-4 flex justify-end">
          <button type="button" class="btn btn-ghost mr-2" data-close-modal="assignmentModal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveAssignmentBtn">Create Assignment</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/course-details.js"></script>

  </body>
</html>
